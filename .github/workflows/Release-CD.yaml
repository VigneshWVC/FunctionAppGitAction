name: Bicep Template Deployment

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  oidc:
    runs-on: windows-latest
    environment: OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Bicep Template Repo
        uses: actions/checkout@v4
        with:
          repository: VigneshWVC/BicepTempate
          ref: main
          path: bicep-template
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show workspace location
        run: |
          Write-Host "Workspace path: $env:GITHUB_WORKSPACE"
          Get-Location
          Get-ChildItem

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Deploy Bicep
        shell: pwsh
        run: |
          az deployment group create `
            --resource-group APIM-RG-GitHub-Action `
            --template-file bicep-template/Bicep_Template/apimservice.bicep

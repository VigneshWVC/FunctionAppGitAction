name: Auto Sync main → develop

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-branches:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GitHub CLI
        run: |
          gh --version

      - name: Create Pull Request (main → develop)
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list \
            --base develop \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ "$EXISTING_PR" != "null" ]; then
            echo "PR already exists: $EXISTING_PR"
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "Creating new PR..."
            PR_URL=$(gh pr create \
              --base develop \
              --head main \
              --title "Auto Sync: main → develop" \
              --body "This PR is automatically created after a merge into main.")

            PR_NUMBER=$(echo $PR_URL | grep -o '[0-9]*$')
            echo "Created PR: $PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Auto approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ steps.create_pr.outputs.pr_number }} --approve

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pr_number }} --merge --auto

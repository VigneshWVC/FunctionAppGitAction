name: Auto Sync main → develop

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-branches:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: OIDC   # 👈 Environment-level secret scope

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify PAT_TOKEN availability
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "❌ PAT_TOKEN is EMPTY - check Environment secrets"
            exit 1
          else
            echo "✅ PAT_TOKEN is available"
          fi

      - name: Set up GitHub CLI
        run: |
          gh --version

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      - name: Create Pull Request (main → develop)
        id: create_pr
        run: |
          EXISTING_PR=$(gh pr list \
            --base develop \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "PR already exists: $EXISTING_PR"
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "Creating new PR..."
            PR_URL=$(gh pr create \
              --base develop \
              --head main \
              --title "Auto Sync: main → develop" \
              --body "This PR is automatically created after a merge into main.")

            PR_NUMBER=$(echo $PR_URL | grep -o '[0-9]*$')
            echo "Created PR: $PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pr_number }} --merge --auto
